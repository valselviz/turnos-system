services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: turnos_db
      POSTGRES_USER: turnos
      POSTGRES_PASSWORD: turnos
    ports:
      - "5432:5432"
    volumes:
      - turnos_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turnos -d turnos_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend/Turnos.Api
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Overrides the connection string from appsettings.json: here "db" is
      # the Postgres service name on this Docker network, not localhost.
      ConnectionStrings__AppointmentsDb: "Host=db;Port=5432;Database=turnos_db;Username=turnos;Password=turnos"
      Cors__AllowedOrigins__0: "http://localhost:5173"
      # Development so Swagger stays available inside the container (useful
      # for showing the API working during the defense).
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5080:8080"

  frontend:
    build:
      context: ./frontend/turnos-app
      args:
        # Vite bakes this into the bundle at build time; it needs to point to
        # the port where the HOST (your browser) will reach the backend, not
        # the internal "backend" name on the Docker network.
        VITE_API_URL: "http://localhost:5080"
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  turnos_db_data:
